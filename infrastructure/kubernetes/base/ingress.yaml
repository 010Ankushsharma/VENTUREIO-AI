apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ventureiq-ingress
  namespace: ventureiq
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.ventureiq.ai
        - api.ventureiq.ai
      secretName: ventureiq-tls
  rules:
    - host: app.ventureiq.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api.ventureiq.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
